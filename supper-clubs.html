<!DOCTYPE html>

<head>

  <style>
    body {
      margin: 0;
      background-color: #FFFCE8; /* soft pale yellow */
      font-family: Arial, sans-serif;
      color: #111;
    }

    .container {
      max-width: 900px;
      margin: 80px auto;
      padding: 0 20px;
    }

/* Instagram icon in top-right corner */
    .instagram-link {
      position: fixed;       /* stay in top-left even when scrolling */
      top: 20px;
      left: 20px;
      width: 32px;           /* icon size */
      height: 32px;
      z-index: 1000;
    }

    .instagram-link img {
      width: 100%;
      height: auto;
      display: block;
    }

   .menu-links {
	position: fixed;
	top: 20px;
	right: 20px;
	font-size: 16px;
	}
   .menu-links a {
	color: #0C0A09;           /* black text */
	text-decoration: none;
    }

    h2 {
      font-size: clamp(40px, 4vw, 120px);
      margin: 0 0 40px 0;
    }

    p.full-width {
      font-size: 30px;
      line-height: 1.6;
      margin: 0 20px 60px 20px; /* spacing on top/bottom + small side padding */
      max-width: none;           /* allow full width */
    }
    p.full-width-small {
      font-size: 25px;
      line-height: 1.6;
      margin: 0 20px 60px 20px; /* spacing on top/bottom + small side padding */
      max-width: none;           /* allow full width */
    }
    .links {
      text-align: center;
      margin-bottom: 60px;
    }

    .links a {
      display: inline-block;
      background-color: #111;   /* dark button */
      color: #FFFCE8;           /* pale yellow text */
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 8px;
      margin: 0 10px;
      font-size: 16px;
      transition: background-color 0.3s;
    }

    .links a:hover {
      background-color: #333;   /* slightly lighter on hover */
    }


    /* Three images side by side */
    .image-row {
      display: flex;
      justify-content: center;  /* center row on page */
      gap: 20px;                /* space between images */
      margin-bottom: 80px;
    }

    .image-row img {
      width: 50%;              /* fixed width for balanced layout */
      height: auto;
      display: block;
    }

    /* Stack images vertically on small screens */
    @media (max-width: 700px) {
      .image-row {
        flex-direction: column;
        align-items: center;     /* keep images centered when stacked */
      }
      .image-row img {
        width: 90%;              /* images fill most of mobile screen */
      }
    }
  </style>
</head>
